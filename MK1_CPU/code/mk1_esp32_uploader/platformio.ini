[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
; Bump the Arduino loop() task stack from the default 8 KB to 32 KB.
; writeEe64Data with verify-retry calls readAt24c512 which itself
; allocates ~3 KB asmBuf — nesting these on the loop task overflows
; the default stack and causes a silent crash mid-upload.
build_flags = -DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
